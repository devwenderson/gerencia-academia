{% extends "base.html" %}
{% block content %}
<h1>Autenticou: {{ request.user.get_full_name }}</h1>
<a href="{% url 'user-update' %}">Atualizar perfil</a>
{% if messages %}
	<ul class="messages">
			{% for message in messages %}
			<li{% if message.tags %} class="{{ message.tags }}"{% endif %}>{{ message }}</li>
			{% endfor %}
	</ul>
{% endif %}
{% endblock content %}
