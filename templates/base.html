{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        {% block title %}Base{% endblock title %}
    </title>
</head>
<body>
    <nav class="nav">
        <a href="{% url 'index' %}">Início</a>
        {% if request.user.is_authenticated %}
            <a href="{% url 'list-assinatura' %}">Assinatura</a>
            <a href="{% url 'list-treino' %}">Treinos</a>
            <a href="{% url 'user-data' %}">Perfil</a>
            <a href="{% url 'logout' %}">Sair</a>
        
        {% if request.user.is_staff %}
            <a href="{% url 'list-pagamento' %}">Pagamentos</a>    
        {% endif %}

        {% else %}
            <a href="{% url 'login' %}">Entrar</a>
            <a href="{% url 'user-create' %}">Cadastrar</a>
        {% endif %}
    </nav>
    {% block content %}
    {% endblock content %}

    <link rel="stylesheet" href="{% static 'css/main.css' %}">
</body>
</html>
