{% extends "base.html" %}
{% block content %}
<h2>Pagamentos</h2>
<table>
	<thead>
		<tr>
			<th>Assinatura</th>
			<th>Valor</th>
			<th>Vencimento em</th>
			<th>Status</th>
		</tr>
	</thead>
	
	<tbody>
		{% for pagamento in pagamentos %}
			<tr>
				<td>{{ pagamento.assinatura.cliente.get_full_name }}</td>
				<td>{{ pagamento.valor }}</td>
				<td>{{ pagamento.vencimento }}</td>
				<td>{{ pagamento.get_status_display }}</td>
			</tr>
		{% endfor %}
	</tbody>
</table>
{% endblock content %}
